<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;text-align:center}
header{background:#333;color:#fff;padding:15px;font-size:24px}
.container{column-count:3;padding:20px}
.card{background:#fff;margin:10px;padding:15px;border-radius:10px;
transition:0.3s;animation:fade 2s}
.card:hover{transform:scale(1.05)}
i{font-size:30px;color:#0077ff}
@keyframes fade{from{opacity:0}to{opacity:1}}
@media(max-width:768px){.container{column-count:1}}
</style>
</head>

<body>

<header>My Responsive Page</header>

<div class="container">
  <div class="card"><i class="fa-solid fa-house"></i><p>Home Section</p></div>
  <div class="card"><i class="fa-solid fa-user"></i><p>Profile Section</p></div>
  <div class="card"><i class="fa-solid fa-envelope"></i><p>Contact Section</p></div>
</div>

</body>
</html>
